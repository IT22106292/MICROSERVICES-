version: '3.8'

services:
  item-service:
    build: ./item-service
    container_name: item-service
    ports:
      - "8081:8081"
    networks:
      - microservices-net
    depends_on:
      api-gateway:
        condition: service_started

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    networks:
      - microservices-net
    depends_on:
      api-gateway:
        condition: service_started

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8083:8083"
    networks:
      - microservices-net
    depends_on:
      api-gateway:
        condition: service_started

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge